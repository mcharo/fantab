<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2fd0e6"/>
      <stop offset="48%" stop-color="#1a86f0"/>
      <stop offset="100%" stop-color="#0b53d6"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mark" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9f2ff"/>
    </linearGradient>
    <filter id="markShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#06337f" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect x="48" y="48" width="928" height="928" rx="228" fill="url(#bg)"/>
  <rect x="48" y="48" width="928" height="928" rx="228" fill="url(#sheen)"/>

  <g filter="url(#markShadow)" fill="url(#mark)">
    <rect x="300" y="250" width="185" height="520" rx="50"/>
    <rect x="300" y="250" width="420" height="170" rx="50"/>
    <rect x="300" y="520" width="336" height="160" rx="50"/>
  </g>
</svg>
