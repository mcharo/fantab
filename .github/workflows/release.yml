name: Release

# Triggered by pushing a version tag, e.g.
#   make release VERSION=0.3.0
#   git commit -am "release 0.3.0" && git tag v0.3.0 && git push --follow-tags
#
# The `release` job builds + creates the GitHub Release automatically. The
# `publish` job is gated by the `chrome-web-store` environment (manual approval +
# v* tags only) and holds the Chrome Web Store credentials.
on:
  push:
    tags:
      - 'v*.*.*'

# Least privilege: grant nothing by default, opt in per job.
permissions: {}

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write # create the GitHub Release + upload the zip
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      # --ignore-scripts blocks dependency install/postinstall code execution.
      - run: npm ci --ignore-scripts

      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - name: Type-check, test, and package
        run: |
          make check
          make package

      # Use the preinstalled gh CLI instead of a third-party release action.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" fantab-*.zip --verify-tag --generate-notes

  publish:
    needs: release
    runs-on: ubuntu-24.04
    # Gated by the chrome-web-store environment: manual review + v* tags only.
    # The CWS_* secrets live in that environment, not in the repo secret scope.
    environment: chrome-web-store
    permissions:
      contents: read # download the release asset via gh
    steps:
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Download the released zip
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release download "$GITHUB_REF_NAME" --pattern 'fantab-*.zip'

      - name: Publish to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          NPM_CONFIG_IGNORE_SCRIPTS: "true"
        # No subcommand = upload AND publish. Use `upload` to leave a draft.
        run: npx --yes chrome-webstore-upload-cli@4.0.1 --source "$(ls fantab-*.zip)"
